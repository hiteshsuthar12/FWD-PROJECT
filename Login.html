<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="box">
            <div class="box1">
                <h1>
                    <img src="travel.png" class="logo-icon">
                    Bharat Yatra
                </h1>
            </div>
        </div>
    </header>
    <div class="box3">

   <form class="login-form" id="loginForm">
    <h2 class="heading">Login</h2>

    <div class="row">
        <label>Email:</label>
        <input class="row1" type="email" id="loginEmail" placeholder="you@example.com">
    </div>

    <div class="row">
        <label>Password:</label>
        <input class="row1" type="password" id="loginPassword" placeholder="Minimum 6 characters">
    </div>

    <button type="submit" class="button5">Login</button>
    <p class="sign-in">
    Create new account?
    <a href="Sign-in.html">Sign In</a>
</p>
</form>


    </div>
    <script src="script.js"></script>
</body>
</html>

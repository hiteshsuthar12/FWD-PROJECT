<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="box">
            <div class="box1">
                <h1>
                    <img src="travel.png" class="logo-icon">
                    Bharat Yatra
                </h1>
            </div>
        </div>
    </header>
    <div class="box3">
<form class="login-form" id="signupForm">
    <h2 class="heading">Sign in</h2>

    <div class="row">
        <label>Name:</label>
        <input class="row1" type="text" id="signupName" placeholder="User Name">
    </div>

    <div class="row">
        <label>Email:</label>
        <input class="row1" type="email" id="signupEmail" placeholder="you@example.com">
    </div>

    <div class="row">
        <label>Password:</label>
        <input class="row1" type="password" id="signupPassword" placeholder="Minimum 6 characters">
    </div>

  <button  class="button5" onclick="signup()">Sign In</button>
    <p class="sign-in">
    Already have an account?
    <a href="Login.html">Login</a>
</p>
</form>


    <script src="script.js"></script>
</body>

</html>
